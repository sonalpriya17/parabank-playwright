# Runs Playwright E2E against the parabank suite when an upstream repo
# (e.g. fabric_assignment) dispatches a `repository_dispatch` event of
# type `upstream-push`. Posts a `parabank-e2e` commit status back onto
# the upstream repo's SHA so the result shows up as a check on their PR.
#
# Required secret: UPSTREAM_STATUS_PAT — fine-grained PAT with
# `Commit statuses: Read and write` on the upstream repo.

name: Upstream E2E

on:
  repository_dispatch:
    types: [upstream-push]

concurrency:
  group: upstream-e2e-${{ github.event.client_payload.source_repo }}-${{ github.event.client_payload.sha }}
  cancel-in-progress: true

env:
  SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
  SOURCE_SHA:  ${{ github.event.client_payload.sha }}
  SOURCE_REF:  ${{ github.event.client_payload.ref }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Post pending status to upstream
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_STATUS_PAT }}
        run: |
          gh api -X POST "repos/${SOURCE_REPO}/statuses/${SOURCE_SHA}" \
            -f state=pending \
            -f context=parabank-e2e \
            -f description="E2E suite running" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Checkout parabank-playwright
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create .env file
        run: |
          echo "BASE_URL=https://parabank.parasoft.com" > .env
          echo "API_BASE_URL=https://parabank.parasoft.com/parabank/services/bank" >> .env

      - name: Generate BDD tests
        run: npx bddgen

      - name: Run Playwright tests
        id: test-run
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.event.client_payload.source_repo }}-${{ github.event.client_payload.sha }}
          path: playwright-report/
          retention-days: 14

      - name: Post final status to upstream
        if: always()
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_STATUS_PAT }}
        run: |
          if [ "${{ steps.test-run.outcome }}" = "success" ]; then
            STATE="success"
            DESC="E2E suite passed"
          else
            STATE="failure"
            DESC="E2E suite failed — see run for details"
          fi
          gh api -X POST "repos/${SOURCE_REPO}/statuses/${SOURCE_SHA}" \
            -f state="$STATE" \
            -f context=parabank-e2e \
            -f description="$DESC" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
