name: Playwright E2E Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  REPORT_URL: https://sonalpriya17.github.io/parabank-playwright/

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create .env file
        run: |
          echo "BASE_URL=https://parabank.parasoft.com" > .env
          echo "API_BASE_URL=https://parabank.parasoft.com/parabank/services/bank" >> .env

      - name: Generate BDD tests
        run: npx bddgen

      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true
        id: test-run

      - name: Generate GitHub Actions test summary
        if: always()
        run: |
          echo "## 🎭 Playwright E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.test-run.outcome }}" == "success" ]; then
            echo "✅ **All tests passed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some tests failed**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 [View Full Report](${{ env.REPORT_URL }})" >> $GITHUB_STEP_SUMMARY

      - name: Upload Playwright report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Deploy report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main' && steps.test-run.outcome != 'skipped'
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Publish to GitHub Pages
        if: always() && github.ref == 'refs/heads/main' && steps.test-run.outcome != 'skipped'
        uses: actions/deploy-pages@v4
        id: deployment

      - name: Send email report
        if: always() && (github.ref == 'refs/heads/main' || steps.test-run.outcome == 'failure')
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: sonalpriya172@gmail.com
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: |
            ParaBank E2E Tests - ${{ steps.test-run.outcome == 'success' && 'PASSED' || 'FAILED' }} - ${{ github.ref_name }}
          to: sonalpriya172@gmail.com,sonalpriya17021993@gmail.com,mistlavender678@gmail.com
          from: sonalpriya172@gmail.com
          html_body: |
            <h2>ParaBank E2E Test Execution Report</h2>
            <hr/>
            <table>
              <tr><td><b>Repository</b></td><td>${{ github.repository }}</td></tr>
              <tr><td><b>Branch</b></td><td>${{ github.ref_name }}</td></tr>
              <tr><td><b>Commit</b></td><td>${{ github.sha }}</td></tr>
              <tr><td><b>Triggered by</b></td><td>${{ github.actor }}</td></tr>
              <tr><td><b>Test Result</b></td><td>${{ steps.test-run.outcome == 'success' && '✅ ALL TESTS PASSED' || '❌ SOME TESTS FAILED' }}</td></tr>
            </table>
            <br/>
            <p><b>📊 View Full Report:</b> <a href="${{ env.REPORT_URL }}">Playwright HTML Report</a></p>
            <p><b>🔗 Actions Run:</b> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Pipeline</a></p>
            <br/>
            <p><i>Report includes Trace Viewer, screenshots, and videos for failed tests.</i></p>
