name: Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why manually triggered (optional)'
        required: false
        default: 'Manual re-run'
  # Fires when an upstream repo (e.g. sonalpriya17/fabric_assignment) sends
  # a repository_dispatch event. Payload shape: { source_repo, sha, ref }.
  repository_dispatch:
    types: [upstream-push]

concurrency:
  # For upstream dispatches, group per (source_repo, sha) so concurrent
  # upstream commits don't cancel each other. For everything else, use ref.
  group: ${{ github.workflow }}-${{ github.event_name == 'repository_dispatch' && format('dispatch-{0}-{1}', github.event.client_payload.source_repo, github.event.client_payload.sha) || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

env:
  REPORT_URL: https://sonalpriya17.github.io/parabank-playwright/

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Post pending status to upstream
        if: github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_STATUS_PAT }}
          SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          SHA: ${{ github.event.client_payload.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api "repos/$SOURCE_REPO/statuses/$SHA" \
            -f state=pending \
            -f context=parabank-e2e \
            -f description="E2E suite running" \
            -f target_url="$RUN_URL"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # For repository_dispatch events, honor `target_branch` in the
          # payload so upstream repos can exercise an unmerged branch of
          # this suite. push/PR events use their own github.ref unchanged.
          ref: ${{ github.event.client_payload.target_branch || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create .env file
        run: |
          echo "BASE_URL=https://parabank.parasoft.com" > .env
          echo "API_BASE_URL=https://parabank.parasoft.com/parabank/services/bank" >> .env

      - name: Generate BDD tests
        run: npx bddgen

      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true
        id: test-run

      - name: Parse test results
        if: always()
        id: test-summary
        run: node scripts/parse-results.mjs

      - name: Generate GitHub Actions test summary
        if: always()
        env:
          OUTCOME: ${{ steps.test-run.outcome }}
          TOTAL: ${{ steps.test-summary.outputs.total }}
          PASSED: ${{ steps.test-summary.outputs.passed }}
          FAILED: ${{ steps.test-summary.outputs.failed }}
          FLAKY: ${{ steps.test-summary.outputs.flaky }}
          FLAKY_SUMMARY: ${{ steps.test-summary.outputs.flaky_summary }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          REPORT_URL: ${{ env.REPORT_URL }}
        run: node scripts/render-summary.mjs

      - name: Post test results comment on PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OUTCOME: ${{ steps.test-run.outcome }}
          TOTAL: ${{ steps.test-summary.outputs.total }}
          PASSED: ${{ steps.test-summary.outputs.passed }}
          FAILED: ${{ steps.test-summary.outputs.failed }}
          FLAKY: ${{ steps.test-summary.outputs.flaky }}
          FLAKY_SUMMARY: ${{ steps.test-summary.outputs.flaky_summary }}
          CF_HITS: ${{ steps.test-summary.outputs.cf_hits }}
          OTHER_TIMEOUT_HITS: ${{ steps.test-summary.outputs.other_timeout_hits }}
          DOUBLE_COLLISION_HITS: ${{ steps.test-summary.outputs.double_collision_hits }}
          COMMIT: ${{ github.sha }}
          REPORT_URL: ${{ env.REPORT_URL }}
        run: node scripts/post-pr-comment.mjs

      - name: Upload Playwright report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Deploy report to GitHub Pages
        if: always() && github.event_name != 'repository_dispatch' && github.ref == 'refs/heads/main' && steps.test-run.outcome != 'skipped'
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Publish to GitHub Pages
        if: always() && github.event_name != 'repository_dispatch' && github.ref == 'refs/heads/main' && steps.test-run.outcome != 'skipped'
        uses: actions/deploy-pages@v4
        id: deployment

      - name: Send email report
        if: always() && (github.ref == 'refs/heads/main' || steps.test-run.outcome == 'failure')
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: sonalpriya172@gmail.com
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: |
            ParaBank E2E Tests - ${{ steps.test-run.outcome == 'success' && 'PASSED' || 'FAILED' }} - ${{ github.ref_name }}
          to: sonalpriya172@gmail.com,sonalpriya17021993@gmail.com,mistlavender678@gmail.com
          from: sonalpriya172@gmail.com
          html_body: |
            <h2>ParaBank E2E Test Execution Report</h2>
            <hr/>
            <table style="border-collapse: collapse; width: 100%; max-width: 600px;">
              <tr><td style="padding: 8px; border: 1px solid #ddd;"><b>Repository</b></td><td style="padding: 8px; border: 1px solid #ddd;">${{ github.repository }}</td></tr>
              <tr><td style="padding: 8px; border: 1px solid #ddd;"><b>Branch</b></td><td style="padding: 8px; border: 1px solid #ddd;">${{ github.ref_name }}</td></tr>
              <tr><td style="padding: 8px; border: 1px solid #ddd;"><b>Commit</b></td><td style="padding: 8px; border: 1px solid #ddd;">${{ github.sha }}</td></tr>
              <tr><td style="padding: 8px; border: 1px solid #ddd;"><b>Triggered by</b></td><td style="padding: 8px; border: 1px solid #ddd;">${{ github.actor }}</td></tr>
              <tr><td style="padding: 8px; border: 1px solid #ddd;"><b>Test Result</b></td><td style="padding: 8px; border: 1px solid #ddd;">${{ steps.test-run.outcome == 'success' && '✅ ALL TESTS PASSED' || '❌ SOME TESTS FAILED' }}</td></tr>
            </table>

            <h3>Test Summary</h3>
            <table style="border-collapse: collapse; width: 100%; max-width: 400px;">
              <tr style="background-color: #f2f2f2;">
                <th style="padding: 8px; border: 1px solid #ddd; text-align: left;">Metric</th>
                <th style="padding: 8px; border: 1px solid #ddd; text-align: left;">Count</th>
              </tr>
              <tr><td style="padding: 8px; border: 1px solid #ddd;">Total Tests Executed</td><td style="padding: 8px; border: 1px solid #ddd;">${{ steps.test-summary.outputs.total }}</td></tr>
              <tr><td style="padding: 8px; border: 1px solid #ddd;">✅ Passed</td><td style="padding: 8px; border: 1px solid #ddd;">${{ steps.test-summary.outputs.passed }}</td></tr>
              <tr><td style="padding: 8px; border: 1px solid #ddd;">❌ Failed</td><td style="padding: 8px; border: 1px solid #ddd;">${{ steps.test-summary.outputs.failed }}</td></tr>
              <tr><td style="padding: 8px; border: 1px solid #ddd;">🔄 Flaky (passed on retry)</td><td style="padding: 8px; border: 1px solid #ddd;">${{ steps.test-summary.outputs.flaky }}</td></tr>
            </table>

            <h3>Retry &amp; Flaky Test Summary</h3>
            <p>${{ steps.test-summary.outputs.flaky_summary }}</p>

            <h3>Failed Tests</h3>
            <p>${{ steps.test-summary.outputs.failed == '0' && 'No failures — all tests passed.' || steps.test-summary.outputs.failed_tests }}</p>
            <p><i>Screenshots, videos, and trace logs for failed tests are available in the full report below.</i></p>

            <br/>
            <p><b>📊 HTML report for this run:</b> download the <code>playwright-report</code> artifact from the <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">run page</a></p>
            <p><b>🔗 Actions Run:</b> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Pipeline</a></p>
            <p><b>📎 Artifacts:</b> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Download screenshots, videos &amp; traces</a></p>
            <p><i>Note: the <a href="${{ env.REPORT_URL }}">GitHub Pages URL</a> shows the <b>last main-branch run only</b> — it does not reflect PR runs.</i></p>

      - name: Post final status to upstream
        if: always() && github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_STATUS_PAT }}
          SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          SHA: ${{ github.event.client_payload.sha }}
          OUTCOME: ${{ steps.test-run.outcome }}
          TOTAL: ${{ steps.test-summary.outputs.total }}
          PASSED: ${{ steps.test-summary.outputs.passed }}
          FAILED: ${{ steps.test-summary.outputs.failed }}
          FLAKY: ${{ steps.test-summary.outputs.flaky }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$OUTCOME" = "success" ]; then
            STATE=success
            DESC="E2E passed: $PASSED/$TOTAL ($FLAKY flaky)"
          else
            STATE=failure
            DESC="E2E failed: $FAILED failed, $PASSED passed, $FLAKY flaky"
          fi
          gh api "repos/$SOURCE_REPO/statuses/$SHA" \
            -f state="$STATE" \
            -f context=parabank-e2e \
            -f description="$DESC" \
            -f target_url="$RUN_URL"

      - name: Fail pipeline if tests failed
        if: steps.test-run.outcome == 'failure'
        run: |
          echo "❌ Tests failed — failing the pipeline."
          exit 1
