name: Playwright E2E Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

env:
  REPORT_URL: https://sonalpriya17.github.io/parabank-playwright/

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create .env file
        run: |
          echo "BASE_URL=https://parabank.parasoft.com" > .env
          echo "API_BASE_URL=https://parabank.parasoft.com/parabank/services/bank" >> .env

      - name: Generate BDD tests
        run: npx bddgen

      - name: Run Playwright tests
        run: npx playwright test 2>&1 | tee playwright-output.txt
        continue-on-error: true
        id: test-run

      - name: Parse test results
        if: always()
        id: test-summary
        run: |
          OUTPUT_FILE="playwright-output.txt"
          if [ -f "$OUTPUT_FILE" ]; then
            # Playwright prints counts on separate lines when there are failures/flaky:
            #   1 failed
            #   2 flaky
            #   4 passed (1.4m)
            # Or on a single line when all pass: "7 passed (30s)"
            # Grep all summary lines, then extract each count independently
            SUMMARY_BLOCK=$(grep -E '^\s*[0-9]+ (passed|failed|flaky)' "$OUTPUT_FILE")

            PASSED=$(echo "$SUMMARY_BLOCK" | grep -oE '[0-9]+ passed' | grep -oE '[0-9]+' || echo "0")
            FAILED=$(echo "$SUMMARY_BLOCK" | grep -oE '[0-9]+ failed' | grep -oE '[0-9]+' || echo "0")
            FLAKY=$(echo "$SUMMARY_BLOCK" | grep -oE '[0-9]+ flaky' | grep -oE '[0-9]+' || echo "0")

            PASSED=${PASSED:-0}
            FAILED=${FAILED:-0}
            FLAKY=${FLAKY:-0}

            TOTAL=$((PASSED + FAILED + FLAKY))

            # Collect failed test names from Playwright output
            FAILED_TESTS=""
            if [ "$FAILED" -gt 0 ]; then
              FAILED_TESTS=$(grep -E '^\s+[0-9]+\)' "$OUTPUT_FILE" | sed 's/^[[:space:]]*//' | head -10)
              if [ -z "$FAILED_TESTS" ]; then
                FAILED_TESTS=$(grep -E '✘|FAIL' "$OUTPUT_FILE" | head -10)
              fi
            fi

            # Build flaky/retry summary
            FLAKY_SUMMARY=""
            if [ "$FLAKY" -gt 0 ]; then
              FLAKY_SUMMARY="$FLAKY test(s) passed on retry (flaky)"
            else
              FLAKY_SUMMARY="No tests required retries. All tests passed on first attempt."
            fi

            # CF-specific failure count — uses the [CLOUDFLARE] tagged warning from RegisterPage
            CF_HITS=$(grep -cE '\[CLOUDFLARE\]' "$OUTPUT_FILE" || echo "0")
            CF_HITS=${CF_HITS:-0}
          else
            TOTAL=0
            PASSED=0
            FAILED=0
            FLAKY=0
            FAILED_TESTS="Test output not found"
            FLAKY_SUMMARY="Unable to determine — test output missing."
          fi

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "flaky=$FLAKY" >> $GITHUB_OUTPUT
          echo "cf_hits=$CF_HITS" >> $GITHUB_OUTPUT
          echo "flaky_summary=$FLAKY_SUMMARY" >> $GITHUB_OUTPUT

          # Use delimiter for multiline output
          echo "failed_tests<<EOF" >> $GITHUB_OUTPUT
          echo "$FAILED_TESTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate GitHub Actions test summary
        if: always()
        run: |
          echo "## 🎭 Playwright E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.test-run.outcome }}" == "success" ]; then
            echo "✅ **All tests passed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some tests failed**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | ${{ steps.test-summary.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | ${{ steps.test-summary.outputs.passed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | ${{ steps.test-summary.outputs.failed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔄 Flaky (passed on retry) | ${{ steps.test-summary.outputs.flaky }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ☁ Cloudflare interstitials hit | ${{ steps.test-summary.outputs.cf_hits }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Retry Summary:** ${{ steps.test-summary.outputs.flaky_summary }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 [View Full Report](${{ env.REPORT_URL }})" >> $GITHUB_STEP_SUMMARY

      - name: Append run to test-history.csv
        if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          OUTCOME="${{ steps.test-run.outcome }}"
          DURATION_SEC=$(grep -oE '\([0-9]+\.?[0-9]*[ms]+\)' playwright-output.txt | tail -1 | sed 's/[()]//g' | awk '/m/{split($0,a,"m"); print int(a[1])*60+int(a[2])} !/m/{sub(/s/,""); print int($0)}')
          DURATION_SEC=${DURATION_SEC:-0}
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          ROW="${TIMESTAMP},${{ github.ref_name }},${SHORT_SHA},${{ github.actor }},${{ steps.test-summary.outputs.total }},${{ steps.test-summary.outputs.passed }},${{ steps.test-summary.outputs.failed }},${{ steps.test-summary.outputs.flaky }},${{ steps.test-summary.outputs.cf_hits }},${OUTCOME},${DURATION_SEC},${RUN_URL}"
          echo "Appending: $ROW"

          # Ensure header exists (first run, or file missing)
          if [ ! -f test-history.csv ] || ! head -1 test-history.csv | grep -q 'timestamp,branch'; then
            echo "timestamp,branch,commit_sha,actor,total,passed,failed,flaky,cf_hits,outcome,duration_sec,run_url" > test-history.csv
          fi

          echo "$ROW" >> test-history.csv

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Pull latest before committing to reduce race with concurrent main runs
          git pull --rebase origin main || true
          git add test-history.csv
          git commit -m "ci: append run ${SHORT_SHA} to test-history.csv [skip ci]" || echo "No changes to commit"
          git push origin main || echo "Push failed — likely raced with another run; non-fatal"

      - name: Upload Playwright report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Deploy report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main' && steps.test-run.outcome != 'skipped'
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Publish to GitHub Pages
        if: always() && github.ref == 'refs/heads/main' && steps.test-run.outcome != 'skipped'
        uses: actions/deploy-pages@v4
        id: deployment

      - name: Send email report
        if: always() && (github.ref == 'refs/heads/main' || steps.test-run.outcome == 'failure')
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: sonalpriya172@gmail.com
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: |
            ParaBank E2E Tests - ${{ steps.test-run.outcome == 'success' && 'PASSED' || 'FAILED' }} - ${{ github.ref_name }}
          to: sonalpriya172@gmail.com,sonalpriya17021993@gmail.com,mistlavender678@gmail.com
          from: sonalpriya172@gmail.com
          html_body: |
            <h2>ParaBank E2E Test Execution Report</h2>
            <hr/>
            <table style="border-collapse: collapse; width: 100%; max-width: 600px;">
              <tr><td style="padding: 8px; border: 1px solid #ddd;"><b>Repository</b></td><td style="padding: 8px; border: 1px solid #ddd;">${{ github.repository }}</td></tr>
              <tr><td style="padding: 8px; border: 1px solid #ddd;"><b>Branch</b></td><td style="padding: 8px; border: 1px solid #ddd;">${{ github.ref_name }}</td></tr>
              <tr><td style="padding: 8px; border: 1px solid #ddd;"><b>Commit</b></td><td style="padding: 8px; border: 1px solid #ddd;">${{ github.sha }}</td></tr>
              <tr><td style="padding: 8px; border: 1px solid #ddd;"><b>Triggered by</b></td><td style="padding: 8px; border: 1px solid #ddd;">${{ github.actor }}</td></tr>
              <tr><td style="padding: 8px; border: 1px solid #ddd;"><b>Test Result</b></td><td style="padding: 8px; border: 1px solid #ddd;">${{ steps.test-run.outcome == 'success' && '✅ ALL TESTS PASSED' || '❌ SOME TESTS FAILED' }}</td></tr>
            </table>

            <h3>Test Summary</h3>
            <table style="border-collapse: collapse; width: 100%; max-width: 400px;">
              <tr style="background-color: #f2f2f2;">
                <th style="padding: 8px; border: 1px solid #ddd; text-align: left;">Metric</th>
                <th style="padding: 8px; border: 1px solid #ddd; text-align: left;">Count</th>
              </tr>
              <tr><td style="padding: 8px; border: 1px solid #ddd;">Total Tests Executed</td><td style="padding: 8px; border: 1px solid #ddd;">${{ steps.test-summary.outputs.total }}</td></tr>
              <tr><td style="padding: 8px; border: 1px solid #ddd;">✅ Passed</td><td style="padding: 8px; border: 1px solid #ddd;">${{ steps.test-summary.outputs.passed }}</td></tr>
              <tr><td style="padding: 8px; border: 1px solid #ddd;">❌ Failed</td><td style="padding: 8px; border: 1px solid #ddd;">${{ steps.test-summary.outputs.failed }}</td></tr>
              <tr><td style="padding: 8px; border: 1px solid #ddd;">🔄 Flaky (passed on retry)</td><td style="padding: 8px; border: 1px solid #ddd;">${{ steps.test-summary.outputs.flaky }}</td></tr>
            </table>

            <h3>Retry &amp; Flaky Test Summary</h3>
            <p>${{ steps.test-summary.outputs.flaky_summary }}</p>

            <h3>Failed Tests</h3>
            <p>${{ steps.test-summary.outputs.failed == '0' && 'No failures — all tests passed.' || steps.test-summary.outputs.failed_tests }}</p>
            <p><i>Screenshots, videos, and trace logs for failed tests are available in the full report below.</i></p>

            <br/>
            <p><b>📊 View Full Report:</b> <a href="${{ env.REPORT_URL }}">Playwright HTML Report</a></p>
            <p><b>🔗 Actions Run:</b> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Pipeline</a></p>
            <p><b>📎 Artifacts:</b> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Download screenshots, videos &amp; traces</a></p>

      - name: Fail pipeline if tests failed
        if: steps.test-run.outcome == 'failure'
        run: |
          echo "❌ Tests failed — failing the pipeline."
          exit 1
